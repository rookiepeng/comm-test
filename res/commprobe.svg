   sodipodi:docname="commprobe.svg"
   inkscape:export-filename="commprobe.png"
   inkscape:export-xdpi="96"
   inkscape:export-ydpi="96"
   inkscape:version="1.4 (86a8ad7, 2024-10-11)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <defs
     id="defs3" />
  <sodipodi:namedview
     id="namedview3"
     pagecolor="#ffffff"
     bordercolor="#666666"
     borderopacity="1.0"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="1.5097656"
     inkscape:cx="255.66882"
     inkscape:cy="256"
     inkscape:window-width="1920"
     inkscape:window-height="991"
     inkscape:window-x="2551"
     inkscape:window-y="1439"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg3" />
  <!-- Background -->
  <rect
     width="512"
     height="512"
     rx="96"
     fill="#f0f4f8"
     id="rect1" />
  <!--
    Square wave: 2 full pulses
    low = y 310, high = y 175
    x: 56 to 456  (400px span)
    segments: 50 low | 100 high | 100 low | 100 high | 50 low
  -->
  <path
     d="M 56,310 H 106 V 175 H 206 V 310 H 306 V 175 H 406 V 310 H 456"
     fill="none"
     stroke="#1e3a5f"
     stroke-width="22"
     stroke-linecap="square"
     stroke-linejoin="miter"
     id="path1" />
  <!--
    Probe: vertical, tip at (356, 175) — middle of the second high pulse.
    Shaft runs up to the handle.
  -->
  <!-- Shaft -->
  <line
     x1="356"
     y1="175"
     x2="356"
     y2="100"
     stroke="#c1121f"
     stroke-width="14"
     stroke-linecap="round"
     id="line1" />
  <!-- Handle -->
  <rect
     x="328"
     y="70"
     width="56"
     height="32"
     rx="10"
     fill="#c1121f"
     id="rect2" />
  <!-- Contact ring -->
  <circle
     cx="356"
     cy="175"
     r="14"
     fill="#c1121f"
     id="circle2" />
  <circle
     cx="356"
     cy="175"
     r="6"
     fill="#f0f4f8"
     id="circle3" />
</svg>
