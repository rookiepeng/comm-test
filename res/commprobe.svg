<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#f0f4f8"/>

  <!--
    Square wave: 2 full pulses
    low = y 310, high = y 175
    x: 56 to 456  (400px span)
    segments: 50 low | 100 high | 100 low | 100 high | 50 low
  -->
  <path d="M 56,310 H 106 V 175 H 206 V 310 H 306 V 175 H 406 V 310 H 456"
        fill="none" stroke="#1e3a5f" stroke-width="22"
        stroke-linecap="square" stroke-linejoin="miter"/>

  <!--
    Probe: vertical, tip at (356, 175) — middle of the second high pulse.
    Shaft runs up to the handle.
  -->

  <!-- Shaft -->
  <line x1="356" y1="175" x2="356" y2="100"
        stroke="#c1121f" stroke-width="14" stroke-linecap="round"/>

  <!-- Handle -->
  <rect x="328" y="70" width="56" height="32" rx="10" fill="#c1121f"/>

  <!-- Contact ring -->
  <circle cx="356" cy="175" r="14" fill="#c1121f"/>
  <circle cx="356" cy="175" r="6"  fill="#f0f4f8"/>

</svg>
